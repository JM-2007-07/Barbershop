<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>barber.eu</title>
    <link rel="stylesheet" href="./src/output.css">
</head>
<body>
    <header class="w-full h-[72px] p-[20px] flex justify-center items-center border-b border-[#E4E4E4]">
        <div class="w-full flex justify-between lg:w-[1200px] items-center">
            <img class="w-[165px] h-[25px]" src="./Images/Logo (7).png" alt="">
            <nav class="hidden lg:flex lg:gap-10">
                <p class="text-[16px] font-bold text-[#69B99D]">Início</p>
                <p class="text-[16px] font-bold text-[#0F241D]">Sobre</p>
                <p class="text-[16px] font-bold text-[#0F241D]">Serviços</p>
                <p class="text-[16px] font-bold text-[#0F241D]">Depoimentos</p>
                <p class="text-[16px] font-bold text-[#0F241D]">Contato</p>
            </nav>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-[32px] h-[32px] text-[#69B99D] lg:hidden">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
            </svg>
        </div>
    </header>

    <main>
        <section class="w-full h-[645px] flex flex-col lg:w-[1200px] lg:m-auto lg:flex-row lg:justify-between lg:items-center py-[40px] gap-[30px] text-center items-center border-b border-[#69B99D]">
            <img class="w-[100%] lg:w-[658px] lg:order-1" src="./Images/Img (1).png" alt="">
            <div class="flex flex-col gap-[30px] text-center items-center lg:items-start lg:text-start">
                <h1 class="text-[30px] font-bold text-[#0F241D] lg:text-[36px] lg:w-[396px]">Saúde natural para os seus cabelos</h1>
                <p class="text-[#767676] w-[298px] lg:text-[18px] lg:w-[347px]">Um salão exclusivo em São Paulo, especializado em tratamentos naturais.</p>
                <button class="w-[214px] h-[56px] rounded-[4px] text-white bg-[#69B99D]">Agendar um horário</button>
            </div>
        </section>
    </main>
</body>
</html>
